name: CI — Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
        - 'backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/crm-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: backend
        run: mvn test -q -Dspring.profiles.active=test

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make GHCR package public
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME="crm-multitenant%2Fcrm-backend"
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            /user/packages/container/${PACKAGE_NAME} \
            -f visibility=public || true

      - name: Update k8s image tag
        if: github.event_name != 'pull_request'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${REPO_LOWER}/crm-backend:sha-${SHORT_SHA}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # FIX: fetch + reset al HEAD mas reciente ANTES de modificar el archivo.
          # El patron anterior (modificar → commit → rebase) fallaba con conflict
          # cuando backend CI y frontend CI corrían en paralelo y ambos tocaban
          # archivos en k8s/ en el mismo ventana de tiempo.
          # Con reset --hard garantizamos partir del estado actual de main,
          # aplicar solo nuestro cambio puntual, y pushear sin divergencia.
          git fetch origin main
          git reset --hard origin/main
          sed -i "s|image: ghcr.io/.*/crm-backend:.*|image: ${IMAGE}|g" k8s/backend/deployment.yaml
          git add k8s/backend/deployment.yaml
          git diff --staged --quiet && exit 0
          git commit -m "ci: update backend image to sha-${SHORT_SHA} [skip ci]"
          git push
