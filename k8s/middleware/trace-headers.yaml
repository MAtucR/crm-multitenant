# Middleware de trazabilidad: no toca X-Forwarded-Proto.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: trace-headers
  namespace: crm-saas
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: ""
---
# Middleware especifico para Keycloak: fuerza X-Forwarded-Proto: http.
# Necesario porque Traefik a veces inyecta 'https' por defecto en algunos
# builds de k3s. Al forzar 'http' explicitamente, Keycloak sabe que el
# entorno es HTTP puro y no aplica el flag Secure en sus cookies de sesion.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: keycloak-http-scheme
  namespace: crm-saas
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "http"
