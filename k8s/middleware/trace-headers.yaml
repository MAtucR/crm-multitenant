# Traefik Middleware: inyecta traceparent W3C si el cliente no lo manda.
# Solo propaga headers de trazabilidad — NO toca X-Forwarded-Proto.
#
# BUG FIX: Se eliminó 'X-Forwarded-Proto: https' de este middleware.
# El sitio corre en HTTP plano (sin TLS). Inyectar ese header causaba que
# NextAuth creyera estar detrás de HTTPS y generara cookies con el prefijo
# '__Secure-', que los browsers rechazan silenciosamente sobre HTTP.
# Resultado: ninguna cookie de sesión se guardaba → 401 en /api/auth/signin.
# X-Forwarded-Proto solo debe setearse cuando Traefik hace TLS termination real.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: trace-headers
  namespace: crm-saas
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: ""
