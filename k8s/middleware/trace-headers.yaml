# Traefik Middleware: propaga X-Forwarded-Proto al backend.
# BUG FIX: traefik.containo.us/v1alpha1 es el API group viejo (Traefik < 2.10).
# k3s usa traefik.io/v1alpha1 desde Traefik v2.10+.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: trace-headers
  namespace: crm-saas
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
