apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-backend
  namespace: crm-saas
  labels:
    app: crm-backend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crm-backend
  template:
    metadata:
      labels:
        app: crm-backend
      annotations:
        metrics.dynatrace.com/scrape: 'true'
        metrics.dynatrace.com/port: '8081'
        metrics.dynatrace.com/path: '/actuator/prometheus'
        dt.mz: 'CRM-SaaS'
    spec:
      # BUG FIX: imagePullSecrets necesario si el paquete GHCR es privado.
      # Crear con: kubectl create secret docker-registry ghcr-secret \
      #   --docker-server=ghcr.io --docker-username=MAtucR \
      #   --docker-password=<PAT> -n crm-saas
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          # CI actualiza este tag automáticamente en cada push a main
          image: ghcr.io/matucrr/crm-multitenant/crm-backend:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/crm
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: http://keycloak:8080/realms/crm
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://dynatrace-collector:4318
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 3
