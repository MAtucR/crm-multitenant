# Recurso Application de Argo CD.
# Aplicar con: kubectl apply -f k8s/argocd/application.yaml -n argocd
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crm-saas
  namespace: argocd
  labels:
    dt.mz: CRM-SaaS
spec:
  project: default

  source:
    # Apunta a este mismo repositorio, carpeta /k8s
    repoURL: https://github.com/MAtucR/crm-multitenant.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: crm-saas

  syncPolicy:
    automated:
      prune: true       # Elimina recursos que ya no están en git
      selfHeal: true    # Auto-corrige drifts manuales
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
