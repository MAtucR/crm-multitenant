# Secret para que k3s pueda hacer pull de imágenes privadas desde GHCR.
# Crearlo manualmente (no commitear con token real):
#
# kubectl create secret docker-registry ghcr-secret \
#   --namespace crm-saas \
#   --docker-server=ghcr.io \
#   --docker-username=<TU_GITHUB_USER> \
#   --docker-password=<TU_GITHUB_PAT_CON_SCOPE_read:packages>
#
# O si el repo es público (packages visibility = public) no hace falta.
#
# Referenciarlo en los Deployments agregando:
#   spec:
#     imagePullSecrets:
#       - name: ghcr-secret
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: crm-saas
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: REPLACE_WITH_BASE64_OF_DOCKER_CONFIG
