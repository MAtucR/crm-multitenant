# Este archivo ya NO es necesario porque los packages de GHCR se publican
# automáticamente como públicos por el CI en cada push a main.
#
# Si por alguna razón necesitás volver a privado, podés recrear el secret:
#
# kubectl create secret docker-registry ghcr-secret \
#   --namespace crm-saas \
#   --docker-server=ghcr.io \
#   --docker-username=MAtucR \
#   --docker-password=<PAT con scope read:packages>
#
# Y agregar en cada deployment:
#   spec:
#     imagePullSecrets:
#       - name: ghcr-secret
