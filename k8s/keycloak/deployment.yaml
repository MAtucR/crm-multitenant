apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: crm-saas
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Esperando postgres..."
                sleep 3
              done
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          args:
            - start-dev
            - --http-relative-path=/auth
          ports:
            - containerPort: 8080
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: admin-password
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres:5432/crm
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            # FIX: KC_PROXY_HEADERS=xforwarded eliminado.
            # Con esa variable Keycloak leia X-Forwarded-Proto para decidir el
            # scheme de sus cookies. Sin TLS real, ese header no llegaba o era
            # inconsistente -> Keycloak ponia cookies Secure sobre HTTP ->
            # browser las descartaba -> error cookie_not_found en cada login.
            # Sin KC_PROXY_HEADERS, Keycloak usa directamente el scheme HTTP
            # de la conexion entrante, que es lo correcto para este entorno.
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: 1500m
              memory: 1.5Gi
          readinessProbe:
            httpGet:
              path: /auth/realms/master
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
