apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: crm-saas
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Esperando postgres..."
                sleep 3
              done
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          args:
            - start-dev
            - --http-relative-path=/auth
            - --import-realm
          ports:
            - containerPort: 8080
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: admin-password
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres:5432/crm
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            # Fuerza a Keycloak a usar la IP publica en todos los endpoints
            # que publica en el discovery document (authorization_endpoint,
            # token_endpoint, issuer, etc.).
            # Sin esto, Keycloak emite URLs con el hostname interno del pod
            # (keycloak.crm-saas.svc.cluster.local) que el browser no puede
            # resolver -> el redirect OAuth falla con 401/ERR_NAME_NOT_RESOLVED.
            - name: KC_HOSTNAME
              value: "181.209.94.221"
            - name: KC_HTTP_RELATIVE_PATH
              value: "/auth"
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: 1500m
              memory: 1.5Gi
          readinessProbe:
            httpGet:
              path: /auth/realms/master
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm
