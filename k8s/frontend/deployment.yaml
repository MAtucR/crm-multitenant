apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-frontend
  namespace: crm-saas
  labels:
    app: crm-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crm-frontend
  template:
    metadata:
      labels:
        app: crm-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/matucr/crm-multitenant/crm-frontend:sha-bc6ab3c
          ports:
            - containerPort: 3000
          env:
            - name: NEXTAUTH_URL
              # URL publica que el browser usa para los redirects de OAuth.
              value: http://181.209.94.221
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: nextauth-secret
            - name: KEYCLOAK_ID
              value: crm-frontend
            - name: KEYCLOAK_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: keycloak-secret
            - name: KEYCLOAK_ISSUER
              # URL interna de Kubernetes para llamadas server-side de NextAuth
              # (discovery, token exchange). Los pods no pueden hacer hairpin NAT
              # a traves de la IP publica 181.209.94.221 de vuelta al cluster.
              # El browser recibe esta URL en el id_token y la usa para validar,
              # pero NextAuth la normaliza con NEXTAUTH_URL en el callback.
              value: http://keycloak.crm-saas.svc.cluster.local:8080/auth/realms/crm
            - name: API_URL
              value: http://crm-backend:8081
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
