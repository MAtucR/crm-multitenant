apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-frontend
  namespace: crm-saas
  labels:
    app: crm-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crm-frontend
  template:
    metadata:
      labels:
        app: crm-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/matucr/crm-multitenant/crm-frontend:sha-27cffa1
          ports:
            - containerPort: 3000
          env:
            - name: NEXTAUTH_URL
              value: http://181.209.94.221
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: nextauth-secret
            - name: KEYCLOAK_ID
              value: crm-frontend
            - name: KEYCLOAK_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secret
                  key: keycloak-secret
            - name: KEYCLOAK_ISSUER
              value: http://181.209.94.221/auth/realms/crm
            - name: API_URL
              value: http://crm-backend:8081
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
