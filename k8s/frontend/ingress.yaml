apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crm-frontend-ingress
  namespace: crm-saas
  annotations:
    kubernetes.io/ingress.class: traefik
    # Hace que Traefik inyecte X-Forwarded-Host con el host publico real.
    # Sin esto Next.js ve el hostname interno del pod en req.headers y
    # construye callbackUrls con la IP interna del pod en lugar de 181.209.94.221.
    traefik.ingress.kubernetes.io/router.middlewares: crm-saas-trace-headers@kubernetescrd
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: crm-frontend
                port:
                  number: 3000
