apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crm-frontend-ingress
  namespace: crm-saas
  annotations:
    kubernetes.io/ingress.class: traefik
    # Forzar entrypoint web (HTTP/80) explicitamente.
    # Sin esto Traefik en k3s registra las rutas tambien en 'websecure' (443)
    # y si tiene redirectToHttps global activo, las requests HTTP son
    # redirigidas a HTTPS donde no hay certificado -> 401/error de conexion.
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: crm-frontend
                port:
                  number: 3000
